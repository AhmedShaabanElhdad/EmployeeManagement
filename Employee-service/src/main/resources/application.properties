spring.application.name=employee-service
server.port=9000
eureka.client.serviceurl.defaultzone=http://localhost:8761/eureka
spring.docker.compose.enabled=false
spring.datasource.url=jdbc:postgresql://localhost:5432/employees
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.flyway.enabled=true

############ Redis Caching ############
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Cache TTL - 10 minutes
spring.cache.redis.time-to-live=600000

############ RabbitMq ############
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=myuser
spring.rabbitmq.password=secret

############ Kafka Saga ############
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=employee-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

############ gRPC Client ############
grpc.client.departmentService.address=discovery:///department-service
grpc.client.departmentService.enableKeepAlive=true
grpc.client.departmentService.negotiationType=plaintext

############ tracing ############
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

############ circuitbreaker ############
resilience4j.circuitbreaker.instances.departmentService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.departmentService.sliding-window-size=10
resilience4j.circuitbreaker.instances.departmentService.wait-duration-in-open-state=10s
