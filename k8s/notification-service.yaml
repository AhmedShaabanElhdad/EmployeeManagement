apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: ems-namespace
spec:
  selector:
    app: notification-service
  ports:
    - port: 8083 # Assuming a port for health checks if enabled
      targetPort: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: ems-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: notification-service:latest
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: ems-config
                  key: EUREKA_URL
            - name: SPRING_RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: ems-config
                  key: RABBITMQ_HOST
            - name: SPRING_MAIL_HOST
              value: "smtp.gmail.com"
            - name: SPRING_MAIL_PORT
              value: "587"
            - name: SPRING_MAIL_USERNAME
              value: "your_email@gmail.com"
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ems-secrets
                  key: MAIL_PASSWORD
            - name: BACKEND_ORIGIN
              value: "http://api-gateway:8080"
            - name: GEMAI_APP_USERNAME
              value: "your_email@gmail.com"
