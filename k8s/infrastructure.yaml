apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: ems-namespace
spec:
  selector:
    app: rabbitmq
  ports:
    - port: 5672
      name: bus
    - port: 15672
      name: management
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: ems-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: "myuser"
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: ems-secrets
                  key: RABBITMQ_PASS
---
