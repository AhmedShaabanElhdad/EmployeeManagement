apiVersion: v1
kind: Service
metadata:
  name: postgres-auth
  namespace: ems-namespace
spec:
  selector:
    app: postgres-auth
  ports:
    - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-auth
  namespace: ems-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-auth
  template:
    metadata:
      labels:
        app: postgres-auth
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_DB
              value: "user"
            - name: POSTGRES_USER
              value: "admin"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ems-secrets
                  key: POSTGRES_PASSWORD
---
