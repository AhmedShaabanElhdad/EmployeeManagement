spring.application.name=api-gateway
server.port=8080
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
spring.cloud.gateway.server.webflux.discovery.locator.enabled=false
################### Resilience4j
resilience4j.circuitbreaker.instances.employeeServiceCircuitBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.employeeServiceCircuitBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.employeeServiceCircuitBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.employeeServiceCircuitBreaker.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.employeeServiceCircuitBreaker.permittedNumberOfCallsInHalfOpenState=3
################### Rate Limit
spring.cloud.gateway.routes[0].filters[0]=RequestRateLimiter
spring.data.redis.host=localhost
spring.data.redis.port=6379
################### Health
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
###################  TimeOut
spring.cloud.gateway.httpclient.connect-timeout=5000
spring.cloud.gateway.httpclient.response-timeout=5s
###################  Observability
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty=INFO
###################  Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans